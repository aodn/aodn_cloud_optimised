name: Release

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Version bump type"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.9"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libudunits2-dev

      - name: Read Poetry version
        id: poetry-version
        run: echo "version=$(cat .poetry-version | tail -1)" >> $GITHUB_OUTPUT

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true
          installer-parallel: true
          version: ${{ steps.poetry-version.outputs.version }}

      #----------------------------------------------
      #       load cached venv if cache exists
      #----------------------------------------------
      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('**/poetry.lock') }}

      #----------------------------------------------
      # install dependencies (make tests = poetry sync --extras "tests notebooks")
      # includes DataQuery tests (test_aodn_data_queries.py needs notebooks extra)
      #----------------------------------------------
      - name: Install project with tests
        run: make tests

      #----------------------------------------------
      #              run test suite
      #----------------------------------------------
      - name: Run tests
        run: poetry run pytest

      #----------------------------------------------
      #        bump version in pyproject.toml
      #----------------------------------------------
      - name: Bump version
        id: bump
        run: |
          python - <<'PYEOF'
          import re, sys
          bump = "${{ github.event.inputs.bump_type }}"
          path = "pyproject.toml"
          content = open(path).read()
          match = re.search(r'^version\s*=\s*"(\d+)\.(\d+)\.(\d+)"', content, re.MULTILINE)
          if not match:
              sys.exit("Could not find version in pyproject.toml")
          major, minor, patch = int(match.group(1)), int(match.group(2)), int(match.group(3))
          if bump == "major":
              major += 1; minor = 0; patch = 0
          elif bump == "minor":
              minor += 1; patch = 0
          else:
              patch += 1
          new_version = f"{major}.{minor}.{patch}"
          new_content = re.sub(
              r'^(version\s*=\s*)"[\d.]+"',
              f'\\1"{new_version}"',
              content,
              flags=re.MULTILINE,
          )
          open(path, "w").write(new_content)
          print(f"Bumped to {new_version}")
          PYEOF
          NEW_VERSION=$(python -c "
          import re
          content = open('pyproject.toml').read()
          m = re.search(r'^version\s*=\s*\"([\d.]+)\"', content, re.MULTILINE)
          print(m.group(1))
          ")
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      #----------------------------------------------
      #        build frozen + unfrozen wheels
      #----------------------------------------------
      - name: Build frozen and unfrozen wheels
        run: |
          # Build unfrozen wheel + sdist first
          poetry build

          # Save unfrozen wheel under a distinct name
          mkdir -p dist-artifacts
          for f in dist/*.whl; do
            cp "$f" "dist-artifacts/$(basename "${f%.whl}").unfrozen.whl"
          done
          cp dist/*.tar.gz dist-artifacts/

          # Freeze the wheel in-place (pins all deps into wheel metadata)
          # see https://github.com/python-poetry/poetry/issues/2778
          poetry self add poetry-plugin-freeze
          poetry freeze-wheel

          # Copy frozen wheel (standard filename, deps pinned)
          cp dist/*.whl dist-artifacts/

      #----------------------------------------------
      #        verify the frozen wheel
      #----------------------------------------------
      - name: Verify frozen wheel
        run: |
          # Install frozen wheel into the Poetry venv (which already has all deps).
          # --no-deps avoids pip trying to resolve the custom xarray git fork from PyPI.
          # --force-reinstall replaces the editable source install with the actual wheel.
          poetry run pip install dist-artifacts/*.whl --no-deps --force-reinstall
          poetry run python -c "import aodn_cloud_optimised; print('Frozen wheel OK')"

      #----------------------------------------------
      #        commit bump + tag + release
      #----------------------------------------------
      - name: Commit version bump and create tag
        if: ${{ !env.ACT }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          git commit -m "chore: bump version to v${{ steps.bump.outputs.new_version }}"
          git tag "v${{ steps.bump.outputs.new_version }}"
          git push origin HEAD
          git push origin "v${{ steps.bump.outputs.new_version }}"

      - name: Create GitHub Release and upload artifacts
        if: ${{ !env.ACT }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.bump.outputs.new_version }}" \
            --title "v${{ steps.bump.outputs.new_version }}" \
            --generate-notes \
            dist-artifacts/*.whl \
            dist-artifacts/*.tar.gz
