name: mamba environment testing

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: "true"

      - name: Set up micromamba
        uses: mamba-org/setup-micromamba@v2
        with:
          # Only install micromamba into PATH — environment creation is handled
          # by setup_miniforge_venvs.sh. generate-run-shell requires an env
          # created by this action so it is intentionally omitted.
          init-shell: bash

      - name: Set up test environment
        # This is exactly what a developer runs locally.
        # Creates AodnCloudOptimised_tests env from environment.yml,
        # configures Poetry to install into it, then runs:
        #   poetry install --extras "tests notebooks"
        run: ./setup_miniforge_venvs.sh tests

      - name: Run pytest and coverage
        run: |
          micromamba run -n AodnCloudOptimised_tests coverage run -m pytest
          micromamba run -n AodnCloudOptimised_tests coverage report --fail-under=60
          micromamba run -n AodnCloudOptimised_tests coverage xml -o coverage.xml

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v4.0.1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          path: coverage.xml
